<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura geral do ToggleMaster na Oracle Cloud Infrastructure</title>
  <desc id="desc">Diagrama com cliente, OCI Load Balancer, Nginx Ingress em OKE, cinco microsserviços, OCIR, PostgreSQL, Redis, OCI Queue e OCI NoSQL.</desc>
  <defs>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0284c7"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #0f172a; }
      .title { font-size: 24px; font-weight: 800; }
      .label { font-size: 20px; font-weight: 800; }
      .sub { font-size: 16px; fill: #475569; }
      .edge-label { font-size: 14px; fill: #334155; font-weight: 700; }
      .box { rx: 12; ry: 12; stroke-width: 2; }
      .edge { fill: none; stroke-width: 3; }
      .dashed { stroke-dasharray: 10 8; }
    </style>
  </defs>
  <rect x="0" y="0" width="1600" height="980" fill="#ffffff"/>
  <rect x="210" y="50" width="1290" height="840" rx="18" fill="#f8fafc" stroke="#334155" stroke-width="2" stroke-dasharray="12 10"/>
  <text x="235" y="88" class="title">Oracle Cloud Infrastructure</text>
  <rect x="360" y="170" width="700" height="580" rx="16" fill="#eef6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="390" y="208" class="title">OKE - Kubernetes Cluster</text>
  <text x="390" y="232" class="sub">Namespace: togglemaster</text>

  <rect x="40" y="280" width="150" height="80" class="box" fill="#ffffff" stroke="#475569"/>
  <text x="115" y="312" text-anchor="middle" class="label">Usuário</text>
  <text x="115" y="338" text-anchor="middle" class="sub">curl / Postman</text>

  <rect x="240" y="280" width="150" height="70" class="box" fill="#fff7ed" stroke="#ea580c"/>
  <text x="315" y="309" text-anchor="middle" class="label">OCI Load</text>
  <text x="315" y="334" text-anchor="middle" class="label">Balancer</text>

  <rect x="430" y="280" width="150" height="80" class="box" fill="#dbeafe" stroke="#2563eb"/>
  <text x="505" y="312" text-anchor="middle" class="label">Nginx</text>
  <text x="505" y="338" text-anchor="middle" class="label">Ingress</text>

  <rect x="1140" y="100" width="210" height="90" class="box" fill="#fef3c7" stroke="#d97706"/>
