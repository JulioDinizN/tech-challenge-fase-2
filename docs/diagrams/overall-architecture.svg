  <text x="730" y="393" text-anchor="middle" class="sub">Feature flags</text>

  <rect x="650" y="440" width="160" height="75" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="730" y="472" text-anchor="middle" class="label">targeting</text>
  <text x="730" y="498" text-anchor="middle" class="sub">rules service</text>

  <rect x="860" y="335" width="160" height="75" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="940" y="367" text-anchor="middle" class="label">evaluation</text>
  <text x="940" y="393" text-anchor="middle" class="sub">hot path</text>

  <rect x="860" y="565" width="160" height="75" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="940" y="597" text-anchor="middle" class="label">analytics</text>
  <text x="940" y="623" text-anchor="middle" class="sub">consumer</text>

  <g>
    <ellipse cx="1235" cy="245" rx="75" ry="18" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <rect x="1160" y="245" width="150" height="50" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <ellipse cx="1235" cy="295" rx="75" ry="18" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="1235" y="270" text-anchor="middle" class="label">PostgreSQL</text>
    <text x="1235" y="294" text-anchor="middle" class="sub">auth DB</text>
  </g>
  <g>
    <ellipse cx="1235" cy="350" rx="75" ry="18" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <rect x="1160" y="350" width="150" height="50" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <ellipse cx="1235" cy="400" rx="75" ry="18" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="1235" y="375" text-anchor="middle" class="label">PostgreSQL</text>
    <text x="1235" y="399" text-anchor="middle" class="sub">flags DB</text>
  </g>
  <g>
    <ellipse cx="1235" cy="455" rx="75" ry="18" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <rect x="1160" y="455" width="150" height="50" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <ellipse cx="1235" cy="505" rx="75" ry="18" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="1235" y="480" text-anchor="middle" class="label">PostgreSQL</text>
    <text x="1235" y="504" text-anchor="middle" class="sub">targeting DB</text>
  </g>
  <g>
    <ellipse cx="1235" cy="560" rx="75" ry="18" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
    <rect x="1160" y="560" width="150" height="50" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
    <ellipse cx="1235" cy="610" rx="75" ry="18" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
    <text x="1235" y="585" text-anchor="middle" class="label">Redis</text>
    <text x="1235" y="609" text-anchor="middle" class="sub">cache</text>
  </g>
  <rect x="1160" y="660" width="150" height="75" class="box" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1235" y="692" text-anchor="middle" class="label">OCI Queue</text>
  <text x="1235" y="718" text-anchor="middle" class="sub">events</text>
  <g>
    <ellipse cx="1235" cy="790" rx="75" ry="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <rect x="1160" y="790" width="150" height="50" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <ellipse cx="1235" cy="840" rx="75" ry="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="1235" y="815" text-anchor="middle" class="label">OCI NoSQL</text>
    <text x="1235" y="839" text-anchor="middle" class="sub">analytics</text>
  </g>

  <path d="M190 320 L240 315" class="edge" stroke="#334155" marker-end="url(#arrow-slate)"/>
  <path d="M390 315 L430 320" class="edge" stroke="#334155" marker-end="url(#arrow-slate)"/>
  <path d="M580 300 L650 267" class="edge" stroke="#2563eb" marker-end="url(#arrow-blue)"/>
  <text x="595" y="282" class="edge-label">/auth</text>
  <path d="M580 326 L650 370" class="edge" stroke="#2563eb" marker-end="url(#arrow-blue)"/>
  <text x="594" y="358" class="edge-label">/flags</text>
  <path d="M560 360 L650 475" class="edge" stroke="#2563eb" marker-end="url(#arrow-blue)"/>
  <text x="568" y="430" class="edge-label">/targeting</text>
  <path d="M580 320 L860 370" class="edge" stroke="#2563eb" marker-end="url(#arrow-blue)"/>
  <text x="760" y="345" class="edge-label">/evaluate</text>

  <path d="M810 267 L1160 270" class="edge" stroke="#dc2626" marker-end="url(#arrow-red)"/>
  <path d="M810 372 L1160 375" class="edge" stroke="#dc2626" marker-end="url(#arrow-red)"/>
  <path d="M810 477 L1160 480" class="edge" stroke="#dc2626" marker-end="url(#arrow-red)"/>
  <path d="M1020 372 L1160 585" class="edge" stroke="#b91c1c" marker-end="url(#arrow-red)"/>
  <text x="1080" y="500" class="edge-label">cache</text>
  <path d="M1020 390 L1160 695" class="edge" stroke="#7c3aed" marker-end="url(#arrow-purple)"/>
  <text x="1086" y="640" class="edge-label">produz eventos</text>
  <path d="M1160 695 L1020 600" class="edge" stroke="#7c3aed" marker-end="url(#arrow-purple)"/>
  <text x="1056" y="646" class="edge-label">consome</text>
  <path d="M1020 625 L1160 815" class="edge" stroke="#0284c7" marker-end="url(#arrow-cyan)"/>
  <text x="1080" y="755" class="edge-label">persiste</text>
  <path d="M860 360 L810 372" class="edge dashed" stroke="#16a34a" marker-end="url(#arrow-green)"/>
  <path d="M860 385 L810 475" class="edge dashed" stroke="#16a34a" marker-end="url(#arrow-green)"/>
  <path d="M1140 145 L1060 200" class="edge dashed" stroke="#d97706" marker-end="url(#arrow-amber)"/>
  <text x="1068" y="152" class="edge-label">imagens</text>
</svg>
