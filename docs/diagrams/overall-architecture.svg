  <text x="1245" y="158" text-anchor="middle" class="sub">Container Registry</text>
  <text x="1245" y="180" text-anchor="middle" class="sub">5 imagens</text>

  <rect x="650" y="230" width="160" height="75" class="box" fill="#dcfce7" stroke="#16a34a"/>
  <text x="730" y="262" text-anchor="middle" class="label">auth-service</text>
  <text x="730" y="288" text-anchor="middle" class="sub">Go API keys</text>

  <rect x="650" y="335" width="160" height="75" class="box" fill="#dcfce7" stroke="#16a34a"/>
