apiVersion: batch/v1
kind: Job
metadata:
  name: auth-database-init
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-database-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: database-init
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: database-init
          image: docker.io/postgres:16-alpine
          command: ["/bin/sh", "/database-init/init.sh"]
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: AUTH_DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: DB_PORT
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: DB_SSLMODE
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: AUTH_DB_NAME
            - name: DB_APP_USER
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: AUTH_DB_USER
            - name: DB_ADMIN_USER
              value: togglemaster_admin
            - name: SCHEMA_FILE
              value: auth.sql
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: secrets-store-inline
              mountPath: /mnt/secrets-store
              readOnly: true
            - name: database-init
              mountPath: /database-init
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: secrets-store-inline
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: auth-database-init-secrets
        - name: database-init
          configMap:
            name: database-init
            defaultMode: 0555
        - name: tmp
          emptyDir:
            sizeLimit: 32Mi
---
