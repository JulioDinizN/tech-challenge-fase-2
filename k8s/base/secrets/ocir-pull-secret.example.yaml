# Template de documentação: crie este Secret em tempo de implantação com o token
# de autenticação do OCIR; não salve o token nem o YAML renderizado no Git.
apiVersion: v1
kind: Secret
metadata:
  name: ocir-pull-secret
  namespace: togglemaster
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: UkVQTEFDRV9NRQ==
