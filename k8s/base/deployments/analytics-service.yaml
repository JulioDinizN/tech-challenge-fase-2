apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: analytics-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: analytics-service
    spec:
      serviceAccountName: analytics-service
      imagePullSecrets:
        - name: ocir-pull-secret
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: analytics-service
          image: togglemaster/analytics-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8005
          env:
            - name: PORT
              value: "8005"
            - name: ANALYTICS_WORKER_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: ANALYTICS_WORKER_ENABLED
            - name: OCI_AUTH_MODE
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: OCI_AUTH_MODE
            - name: OCI_REGION
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: OCI_REGION
            - name: OCI_QUEUE_OCID
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: OCI_QUEUE_OCID
            - name: OCI_QUEUE_MESSAGES_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: OCI_QUEUE_MESSAGES_ENDPOINT
            - name: OCI_NOSQL_TABLE
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: OCI_NOSQL_TABLE
            - name: OCI_COMPARTMENT_OCID
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: OCI_COMPARTMENT_OCID
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
