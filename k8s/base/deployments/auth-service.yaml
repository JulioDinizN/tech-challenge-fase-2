apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-service
    spec:
      serviceAccountName: auth-service
      imagePullSecrets:
        - name: ocir-pull-secret
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-service
          image: togglemaster/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          env:
            - name: PORT
              value: "8001"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: AUTH_DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: AUTH_DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: AUTH_DB_USER
            - name: DB_SSLMODE
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: DB_SSLMODE
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: auth-runtime-secrets
                  key: DB_PASSWORD
            - name: MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-runtime-secrets
                  key: MASTER_KEY
            - name: BOOTSTRAP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: auth-runtime-secrets
                  key: BOOTSTRAP_API_KEY
            - name: BOOTSTRAP_API_KEY_NAME
              value: oke-evaluation-service
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
