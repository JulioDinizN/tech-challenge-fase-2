apiVersion: apps/v1
kind: Deployment
metadata:
  name: evaluation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: evaluation-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evaluation-service
    spec:
      serviceAccountName: evaluation-service
      imagePullSecrets:
        - name: ocir-pull-secret
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: evaluation-service
          image: togglemaster/evaluation-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8004
          env:
            - name: PORT
              value: "8004"
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: REDIS_URL
            - name: FLAG_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: FLAG_SERVICE_URL
            - name: TARGETING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: TARGETING_SERVICE_URL
            - name: OCI_AUTH_MODE
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: OCI_AUTH_MODE
            - name: OCI_QUEUE_OCID
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: OCI_QUEUE_OCID
            - name: OCI_QUEUE_MESSAGES_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: togglemaster-config
                  key: OCI_QUEUE_MESSAGES_ENDPOINT
            - name: SERVICE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: evaluation-runtime-secrets
                  key: SERVICE_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
